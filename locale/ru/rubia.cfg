research-with-biorecycling=Открой исследование, используя науку пакет биопереработки.
rubia-lore-complete=Собери всю информацию, исследуя свалки Рубии.
rubia-easy-mode=Выбери более подходящую сложность для Рубии.
rubia-very-very-hard-clear=Победи Рубию на уровне сложности "Инженер должен умереть!" — с самого приземления и до взлёта.

