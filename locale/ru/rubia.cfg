[technology-description]
;Anything dropping from orbit will be bombarded with garbage and take severe impact damage. Normal rockets taking off from the surface are also not safe. Better technology is needed to deal with it. 
planet-discovery-rubia=Ветреная планета, покрытая мусором. Низкая гравитация и сильные ветры постоянно подхватывают обломки и швыряют их с большой скоростью, в том числе и на низкой орбите. На планете живут полезные микробы, которые позволяют перерабатывать мусор в более полезные материалы. \n[img=utility/warning_icon]Смотрите [font=default-semibold]"Советы и хитрости"[/font] для получения информации о планете.
operation-iron-man=Усовершенствованные системы наведения и бронированные капсулы позволяют безопасно сбрасывать грузовые капсулы через враждебное воздушное пространство Рубии.

rubia-unknown-technology=Чтобы узнать, что ждет вас впереди, необходимо провести дополнительное исследование Рубии.
rubia-progression-stage1=Вы обнаружили бактерию, питающуюся отбросами, и назвали ее __ITEM__rubia-bacteria-A__. В этих краях наука ведется немного по-другому.
rubia-progression-stage1B=Станьте единым целым с мусором. Получив начальное представление о Мусоро-пультах, вы готовы построить свою первую базу из хлама.
rubia-progression-stage2=Усердное изучение мусорологии привело вас к открытию маловероятного друга - маленького организма, которого вы безвкусно назвали __ITEM__rubia-bacteria-B__.
rubia-progression-stage3=Вы изучали мусор. Купались в нем. Вы научились его делать. Наконец-то вы готовы поднять свои навыки работы с мусором на новый уровень.
craptonite-processing=Если вы открыли самый прочный материал в галактике, вы можете назвать его как угодно, это не значит, что так и должно быть.
rubia-armored-train=Наконец-то вы можете создавать поезда, способные выдержать ветра планеты Рубия.
rubia-project-trashdragon=Создать бронированные ракеты, способные выдержать интенсивный шквал обломков в воздушном пространстве Рубии.

rubia-scrapapalooza=Лучше, чем «Ломтоберфест». По крайней мере, в названии есть буква «Л».
rubia-sniper-turret=Новички оптимизируют завод для увеличения производства. Профи оптимизируют завод ради более низкого UPS и шума.
rubia-postgame-biorecycle-part1=Только такой настоящий мусорный тиран, как вы, может оценить ценность столь эксцентричного использования этих бактерий.

rubia-long-bulk-inserter=Оснастите длинные манипуляторы прочной рамой из краптонита, способной выдержать огромный крутящий момент при быстром взмахе большим количеством предметов.
rubia-long-stack-inserter=Венец производства завода «Рубия». Благодаря прочной раме из краптонита, тяжелому урановому основанию и гибким рукояткам из углеродного волокна этот штабелеукладчик может быстро сбрасывать стопки предметов на большие расстояния. Медленнее, чем обычные массовые манипуляторы.

craptonite-wall=Используйте усиление краптонитом, чтобы создать самые прочные оборонительные сооружения в галактике. Эти стены могут остановить [entity=medium-trashsteroid] не позволяя им пересечь их.
craptonite-axe=Замените свой дрянной стальной топор на прочный топор из краптонита, способный добывать полезные ископаемые гораздо эффективнее. Открывает доступ к разнообразной амуниции из краптонита.

rubia-efficiency-module4=Прикрепив к машине крапталитический преобразователь, вы разъярите нейтронами все проходящие через него частицы загрязнения, в результате чего они взорвутся и испустят сладковатый аромат краптонита.
rubia-holmium-craptalysis=Прохождение руды через краптализатор разрушает атомы гольмия, заставляя их стремиться к выходу и более эффективному попаданию в раствор.

craptonite-productivity=Настоящим вы лишаетесь привилегий на присвоение имен. Мы называем его «Продуктивность краптонитовых корпусов», и оно вам понравится.
rubia-braking-force-8=Ваши поезда слабы, а мне нужна скорость.

rubia-biofusion-science-pack=Последнее испытание Рубии: Нечестивая бодяга, замешанная на ДНК существ с разных планет. Дополнительно. ВНИМАНИЕ: НЕ ПРОВЕРЕНО. ДЕЙСТВУЙТЕ НА СВОЙ СТРАХ И РИСК!
rubia-biofusion-science-pack-removed=Удаление Глебы из игры лишает вас доступа к послеигровому контенту Рубии. Хреново быть тобой.\nSee: __1__
rubia-nutrients-from-sludge=Научитесь фильтровать и перерабатывать полезную органику из бактериального ила для получения удобного биотоплива на Рубии.
rubia-nutrient-productivity=Производите питательные вещества более эффективно.
rubia-biochamber-productivity-bonus=Ваш богатый опыт работы с биологией позволяет вам использовать биокамеру более эффективно.
rubia-biofusion-promethium-science-pack=Используйте ваш опыт в межпланетной биологии, чтобы более эффективно создавать __ITEM__promethium-science-pack__ .
rubia-cargo-landing-pad-capacity=Ваш опыт в управлении сброшенным грузом через враждебное воздушное пространство Рубии позволяет вам установить одну дополнительную посадочную площадку на каждую планету.
rubia-bio-utility-science-pack=Ваш биологический опыт позволяет вам видеть жизнь даже в роботах! __ENTITY__biochamber__ позволяет создать __ITEM__utility-science-pack__ с более высокой эффективностью. Ваше объяснение о том, как это работает, будет высоко оценено, мистер Эксперт.
rubia-bio-flying-robot-frame=В твоём больном воображении ты представляешь, как бактерии собирают корпуса роботов, двигая крошечные детальки своими маленькими бактериальными ручками. Детали они расходуют неэффективно, зато работают быстро.

;Craptonite tools
rubia-craptonite-boots=Краптонитовые ботинки с отделкой и подошвой из гольмиевого сплава для более быстрого бега. Ощущайте краптонитовые стельки с каждым шагом.
rubia-craptonite-hook=Краптонитовый браслет с мощным механизмом, который выстреливает вольфрамовый крюк с цепью, чтобы доставать предметы с больших расстояний.
rubia-craptonite-satchel=Прочный ранец из прочного углеродного волокна и прочного краптонитового каркаса, чтобы вместить больше мусора.
rubia-craptonite-cannister=Храните бутылку охлажденной воды Gamer Girl Bathwater™ в канистре, укрепленной краптонитом. Охлажденная с помощью аквилонских криогенных технологий, один глоток этой "воды?" всегда будет заряжать вас энергией и блевотиной.
rubia-craptonite-eyedrop=Твои глаза жгутся, пока они впитывают эту жижу, зато Она обещает тебе супер-зрение. Она требует плату за своё благословение. Правда, в настройках мода всегда можно послать Её щедроты куда подальше.
;Other mods
rubia-craptonite-circlet=Мощный краптонитовый циркуль, инкрустированный кусочком лучшего в галактике Мошайна. Вы считаете, что он помогает общаться с машинами.
rubia-craptonite-earring=Краптонитовое кольцо, покрытое плутонием, чтобы согревать вас и направлять нейтроны по правильному пути.
rubia-craptonite-glove=Перчатки с платиновым катализатором на краптонитовой подложке позволяют быстрее изготавливать предметы. 
rubia-craptonite-lamp=Держите энергосберегающую лампу на своем костюме. Ее прочный краптонитовый каркас выдерживает высокое давление и освещает самые темные глубины. 
rubia-craptonite-belt-buckle=Сделайте пряжку из краптонита, украшенную драгоценным метеоритом из __PLANET__muluna__. Космос позаботится о том, чтобы ваши брюки держались надежно.
rubia-craptonite-bracer=Куб куб куб куб, куб Куб куб куб — куб куб Куб куб. Куб куб, куб куб куб Куб! Куб куб куб куб куб куб куб... куб? КУБЕ!!!?!? Куб куб куб Куб куб куб КУБ Куб; Куб, Куб куб. куб куб куб куб (куб куб Куб), куб Куб куб куб? КУБ/куб/куб куб Куб куб куб: куб, куб, Куб, куб куб. Куб куб куб.
rubia-craptonite-hip-replacement=С сомнительными методами замените хрящ бедра на прочный шарнир из краптонита, закреплённый на костях титановыми соединениями Jahtran. Усиленный сустав позволяет нести более тяжёлые грузы [font=default-tiny-bold]с некоторыми обезображивающими побочными эффектами.[/font]
rubia-craptonite-codpiece=Прибавь себе уверенности с этим золотистым блестящим набедренником, который с вызывающей пошлостью прикрывает твои драгоценности с помощью крептонитового каркаса. Он постоянно напоминает: выжимай максимум из того, что имеешь, даже если оно не оправдало твоих надежд по части размера.
rubia-craptonite-wood-charm=Карабин из краптонита — и вот эти вот шикарные деревяшки уже болтаются у твоего бока, требуя от каждого встречного дерева взирать на тебя с благоговением.
rubia-craptonite-mask=Эта безвкусная маска внушает тебе, что ты способен видеть сквозь время.
rubia-craptonite-tiber-implant=Этот имплант болезненно вонзает свои иглы тебе под кожу, чтобы твоя кровь постоянно нежно обнималась с тиберием. Зато теперь ты будешь видеть тиберий решительно во всём.
rubia-craptonite-grillz=Докажи вселенной, что по части дурновкусия тебе нет равных, — надень эти цинковые грилзы, укреплённые краптонитом. После такого «улучшения» твои зубы будут ощущаться настолько токопроводящими, что хоть розетку лижи.
rubia-craptonite-stopwatch=Ты смастерил этот секундомер из множества крошечных деталей из экзотических актинидов, запихнутых в корпус из краптонита. Несмотря на твой сомнительный вкус в моде, светящийся циферблат позволяет тебе быть пунктуальным на любом распаде вещества. Постоянное ношение этого высокорадиоактивного предмета при себе гарантирует, что он переживёт тебя.
rubia-craptonite-rainbow-brooch=Эта навороченная крептонитовая побрякушка содержит в себе мощный призматический камень, который делает того, кто её носит, просто сияющим.
;WIP
rubia-craptonite-carrot=Эта «морковка» начинена аппаратурой Раббаскан, которая высасывает энергию из окружающего эфира. Краптонит внутри позволяет выдерживать самые дикие вибрации, пока устройство заряжает своего хозяина по полной программе. Рекомендуется использование ButtPlug.io для полной синхронизации

rubia-progression-stage1-compat-k2so=В твоих жилах бушует дух самого Крастора. Древние бактериальные секреты по производству никчёмных фиговин наконец-то доходят до твоей дубовой башки.

