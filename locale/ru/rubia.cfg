rubia-project-trashdragon=Возможность запуска ракет с Рубии.
operation-iron-man-effect=Посадочные капсулы с игроками или грузом могут безопасно приземляться на Рубию.
biofusion-bacteria-release=Распространение ключевых бактерий Глеба больше не ограничивается её поверхностью.
rubia-craptonite-lamp=Увеличение радиуса освещения персонажа во Впадине.
rubia-bio-utility-science-pack-unlock=__ITEM__utility-science-pack__ может быть создан в __ENTITY__biochamber__ с большей эффективностью.
cargo-landing-pad-count=Грузовых посадочных площадок на планету: +__1__
rubia-zoom-modifier=Радиус зума +__1__%

rubia-sniper-turret-attack-bonus=__ITEM__rubia-sniper-turret__ урон: +__1__

