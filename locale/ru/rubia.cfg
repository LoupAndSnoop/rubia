pre-rubia-cutscene-prepared=Вы чувствуете себя готовым к Рубии, но готова ли Рубия к вам?
pre-rubia-cutscene-unprepared=У вас возникает ощущение, что вы недостаточно подготовлены к Рубии - как будто вы забыли прочитать что-то важное перед отъездом.
pre-rubia-cutscene-unprepared-naked=Вы чувствуете дрожь по телу. Вы совершенно беззащитны, и это путешествие закончится верной смертью.
pre-rubia-cutscene-unprepared-low-shield=Вы чувствуете себя почти беззащитными. У вас нет почти полной защиты, чтобы приземлиться на Рубию живым.
pre-rubia-cutscene-unprepared-medium-shield=Вы чувствуете, что у вас есть только половина снаряжения, необходимого для того, чтобы приземлиться на Рубию без смерти.
pre-rubia-cutscene-unprepared-almost-shield=Вы чувствуете, что вам едва хватает того, что необходимо для того, чтобы приземлиться на Рубию без смерти.
pre-rubia-cutscene-unprepared-too-close=Неясно, выживешь ли ты при посадке на Рубию. Шансы слишком малы.


;⚠️ = [img=utility/warning_icon]
landing-cutscene-part1=[img=utility/danger_icon] Корпус поврежден
landing-cutscene-part2=[img=utility/danger_icon] Посадочные двигатели уничтожены
landing-cutscene-part3=[img=utility/danger_icon] Аварийные двигатели повреждены. Приготовьтесь к удару
on-player-died-on-entry=Вы погибли от сильного удара при входе на планету. Вам нужно быть способным выдержать больше повреждений, чтобы выжить при посадке.
landing-cutscene-abort-external-mod=(Rubia): Вы не можете высадиться на Рубию без дополнительной защиты. У вас стоит мод, пропускающий полёты в космосе, но требования для безопасной посадки на Рубию никто не отменял. Подробнее — в „Краткой сводке по планете Рубия“

promethium_warning=⚠️ У вас исследована бесконечная производительность исследований, а Рубия добавила свой научный пакет к своей стоимости. Это поведение можно отключить в настройках мода, если вы этого не хотите. Это предупреждение больше не появится в этом сохранении.
promethium_warning-part2=⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️
rocketizer-warning=⚠️ До установки Рубии на вашей базе уже был ENTITY__rci-rocketizer. По умолчанию Рубия изменяет требования для разблокировки и рецепт этого объекта. Это поведение можно изменить в «Настройках мода». Это предупреждение больше не будет появляться в этом сохранении.


rubia-rocket-silo-setting-warning=ВНИМАНИЕ:[entity=logistic-robot] не может переместиться к ракетным шахтам на Рубии. Произойдёт автоматическое отключение логистических запросов.

[rubia-crapapult]
yeet-item=Выбросите __1__
yeet-recipe=Выбросите __1__
yeet-item-description=Выбросите __1__на ветер с помощью __ENTITY__crapapult__
yeet-recipe-description=Выбросите __1__ на ветер с помощью __ENTITY__crapapult__.


[rubia-lore]
rubia-notice-prestring=(Рубия)
spidertron-mine-hint-part1=Вы обнаруживаете странную бактерию, переваривающую металлический каркас спайдертрона. Вы называете этот вид [font=compi]"__ITEM__rubia-bacteria-A__"[/font], не обращая внимания на то, что другие люди могут вас осудить.
spidertron-mine-hint-part2=Вы не можете перестать думать о том первом крушении спайдертрона. Вы вдохновляетесь идеей построить большую пушку, которая будет [font=compi]выбрасывать ненужные предметы на ветер[/font]. Вы называете свою конструкцию [font=compi]«__ENTITY__crapapult__»[/font] и хихикаете над своей гениальной игрой слов.
spidertron-mine-part1=На этом спайдертроне имелся логистический запрос на какой-то куб.
spidertron-mine-part2=В грузе этого спайдертрона была изношенная «Contem□□□□□on Card». Не имея возможности использовать ее, вы выбросили ее на ветер, чтобы никогда больше не увидеть.
spidertron-mine-part3=У этого спайдертрона есть диск с надписью "Fas□□□□ □□□n Light Th□□□□: □□rt C." Он поврежден до нельзя и окончательно развалится в вашем инвентаре.
spidertron-mine-part4=Из всех этих спайдертронов, которые вы собрали, ясно, что куб (если он вообще здесь был) определенно больше не на этой планете.
spidertron-mine-destroyer-trap=Шаря по карманам этого паукотрона, вы случайно задеваете пару капсул с дронами-разрушителями. Они активируются.
spidertron-mine-destroyer-trap-2=Вы задаётесь вопросом, что же творилось на Рубии, чтобы потребовалось создавать этих дронов-разрушителей.


train-stop-mine-part1=На этой ржавой железнодорожной станции висит потертая записка: "Я испортил коэффициенты. Пожалуйста, исправьте - Трангар"
train-stop-mine-part2=На этом столбе просто вырезано слово "ZIGGURAT", снова и снова.
train-stop-mine-part3=Когда-то эта железнодорожная станция называлась "Grak Pack".
train-stop-mine-part4=В этой железнодорожной станции есть заметка от Boskid, в которой он подробно описывает свои попытки помешать Raiguard узнать о своих спагетти.
train-stop-mine-part5=Под этой железнодорожной станцией ты находишь потрёпанную книгу: «Аномантия: трактат о чтении складок и морщин ануса.»
train-stop-mine-part5-2=Пролистав пару страниц, ветер вырывает книгу из твоих рук. Ты думаешь, не найти ли новую копию в интернете.
train-stop-mine-part6=В этих обломках застряла запись, но её невозможно разобрать. Вы отправляете данные на свою главную базу для анализа.
train-stop-mine-part6-2=Анализ записи, которую вы нашли ранее, завершён. Документы указывают на строительство огромной железнодорожной линии, предназначенной для достижения «конца света». Неясно, увенчалась ли успехом попытка «Zyl□□□□».
train-stop-mine-part7=Вы находите тайник с документами, в которых предлагаются технологии для отмены ветра. Поперёк них тянутся полосы фекальных масс — вероятно, от раздражённого получателя.
train-stop-mine-part8-rand1=На этой остановке стоял ящик с «живолитом». Завидуя, что кто-то другой безвкусно назвал этот минерал первым, вы в ярости раздавливаете ящик.
train-stop-mine-part8-rand2=На этой остановке стоял ящик с «бобмонием». Вы в ярости раздавливаете ящик, завидуя, что кто-то дал этому минералу имя ещё более безвкусное, чем могли бы вы.
train-stop-mine-part8-rand3=На этой остановке стоял ящик с «иммерситом». Вы с печалью выбрасываете ящик, зная, что могли бы дать этому минералу гораздо более смешное название.
train-stop-mine-part8-rand4=На этой остановке стоял ящик со «ступидием». Вы хихикаете про себя, довольные тем идиотским названием, которое кто-то дал этому элементу.
train-stop-mine-part8-rand5=На этой остановке стоял ящик с «некселитом». Он выглядит куда сложнее, чем вы себе представляли, поэтому вы осторожно отходите от ящика.
train-stop-gun-turret-trap=Копаясь в хламе, вы находите под обломками орудийную турель с надписью: «Соб□□□ость Боба». Ваша возня приводит её в движение.


;junk-mine-hint-part1=Разбирая обломки, вы вдохновляетесь идеей большой пушки, чтобы выбрасывать ненужные предметы на ветер. Вы называете свою конструкцию __ENTITY__crapapult__.
junk-mine-part1=В этой куче мусора ты находишь потрёпанный чертёж за авторством «Фр□□□». Он не имеет никакого смысла… пока ты не наклоняешь его на 45 градусов. Раздражённо отбрасываешь его.
;В этой куче мусора ты видишь сломанный насос с фильтром, настроенным на какую-то жидкость, которую ты никогда раньше не встречал.
junk-mine-part2=В этой куче есть работы человека по имени "HideBoar". Вы надежно спрятали его там, где другие люди не смогут осудить вас за него.
junk-mine-part3=В этой куче хлама находится рецензия, в которой говорится: "Мараксис: 7/10. Слишком много воды". Вы смущены, но все равно не согласны.
junk-mine-part4-rand1=Вы находите разбитую фотокарточку. На обороте написано "Jul□□□, □□ali, Lo□□, and □□ppy". Фотокарточка исцарапана до неузнаваемости.
junk-mine-part4-rand2=Вы находите разбитую фотокарточку. На обороте написано "□□□vik, Ju□□□□, □□garre, and Buf□□□". Вы не знаете, кто эти люди, но надеетесь, что у них все в порядке.
junk-mine-part4-rand3=Вы находите разбитую фотокарточку. На обороте написано "De□□□□□r, □0X, □□□□hiri, and □earw□□□". Фотокарточка исцарапана до неузнаваемости.
junk-mine-part4-rand4=Вы находите разбитую фотокарточку. На обороте написано "□oj□, □□□itri, Fox□□□□". Вы задаетесь вопросом, знают ли эти люди друг друга.
junk-mine-part4-rand5=Вы находите разбитую фотокарточку. На обороте написано "Grak□□□□, □□□□eymint, Ma□□, □□□□wuka". От фотокарточки чувствуется слабый запах пиццы.
junk-mine-part4-rand6=Вы находите разбитую фотокарточку. На обороте написано "Be□□□, □□□cado, Recor□□□, □□□box". Вы их не знаете, но надеетесь, что у них все хорошо.
junk-mine-part5=В этой куче был кусок «гриля». Сразу видно, что он ни на что не годен, но видно, что на его изготовление ушло немало времени.
junk-mine-part6-rand1=Вы находите брошенную гитару. На сзади написано "□□□□□□ Dan". Эта гитара была очень любима.
junk-mine-part6-rand2=Вы находите брошенную гитару. На сзади написано "JJ". На нем есть слабые следы декоративных цветов.
junk-mine-part6-rand3=Вы находите брошенную гитару. На сзади написано "□□□□□rat". Она очень сильно изношена.
junk-mine-part7=В этой куче мусора ты находишь каменно-твёрдый тороид в разорванной упаковке и чек с надписью "Lau□□□□". Как жестоко… Плесень превратила его в нечто совершенно несъедобное.
junk-mine-grenade-trap=Среди обломков лежит коробка с маркировкой "□□ig□□□□/□□_□rt". Ты неосторожно открываешь её — и содержимое с силой вырывается наружу.
junk-mine-grenade-trap-2=Всё внутри коробки уничтожено взрывом, включая какие-то документы. Похоже, её содержимое явно предназначалось не для посторонних глаз.

all-lore-done=Вряд ли вы найдете еще какие-нибудь интересные послания из прошлого.
;deprecated=На этой железнодорожной станции вырезаны символы: "🦶📸🍆💦". Вы не знаете, что это значит, но все равно чувствуете отвращение.

[rubia-taunt]
forgot-roboport-failsafe=(Loup&Snoop)  Вы забыли принести личный робопорт в Рубию. Проверьте свой инвентарь.
forgot-roboport-failsafe-part2=(Loup&Snoop) И этот робопорт не бесплатный. В качестве компенсации я съем твою левую ногу.

rubia-first-blast-off-part1=(Рубия) И вот инженер взлетел на своей дюрьмовой ракете, стремясь открыть больше материалов и планет, стремясь дать им имена еще хуже, чем на Рубии.
rubia-first-blast-off-part2=(Рубия) Воистину, в космосе нет места, защищенного от этой угрозы.
rubia-first-blast-off-part3=(Loup&Snoop) Поздравляю с победой над Рубией. Я всегда сомневался в тебе.
rubia-first-blast-off-part4-mp=(Loup&Snoop): А, теперь ясно, что тут произошло. Спасибо всем, что так любезно дотащили 1 до победы. Без вас он бы не справился.
rubia-first-blast-off-part5-mp=(Loup&Snoop): Да нет, реально. __1__ просто часик прохлаждался, пока остальные всё тащили

;WIP (unused)
rubia-shield-warning-convo-part1=(exfret) Он ни за что не догадается. Он слишком глуп.
rubia-shield-warning-convo-part2=(Loup&Snoop) Я хочу верить
rubia-shield-warning-convo-part3=(exfret) он точно разобьется об стену
rubia-shield-warning-convo-part4=(Loup&Snoop) нет нет нет. он повернет назад. только посмотрите!

[version-change-warnings]
rubia-trashsteroid-health-scaling=Так… не злись, но я исправил баг, из-за которого здоровье мусороидов не масштабировалось должным образом при изучение огнестрельного урона… Простая опечатка! Но с другой стороны, я добавил настройки сложности в «Настройки мода» => «Настройки карты». Если твоя база вдруг начнёт взрываться, стоит ими воспользоваться. Удачи!
rubia-craptonite-wall=(Loup&Snoop / Rubia) Хорошие новости! Стены из краптонита получили усиление в недавнем обновлении. Подробности смотри в технологии или в разделе «Советы и подсказки».
rubia-craptonite-wall-recipe=(Loup&Snoop / Rubia): Внимание: рецепт краптонитовых стен изменён, а специфичный для Рубии рецепт очищенного бетона удалён.
rubia-factorissimo-destruction_warning=(Rubia): Фабрики Factorissimo на Рубии будут уничтожены через __1__ минут. Понижение версии вызовет аварийное завершение работы (краш).
;rubia-factorissimo-destruction-position=Factorissimo factories on Rubia moved to: [gps=__1__,__2__,__3__]
rubia-bzmod-silo-recipe-change=(Rubia): Предупреждение: Рубия только что внесла изменение в рецепты ракетных шахт для набора модов BZ. Базовый рецепт шахты теперь снова использует припой.

rubia-tangible-projectile-mod-warning=(Loup&Snoop / Rubia): Предупреждение. Вы используете мод, который делает пули реальными снарядами (distant misfire). Это делает Рубию значительно сложнее, чем задумано.
rubia-tech-cost-multiplier-warning=(Loup&Snoop / Rubia): Внимание: Вы играете с множителями стоимости технологий, но на Рубии установлен стандартный x1. Технологии триггеров Рубии имеют собственный отдельный множитель стоимости, который настраивается в параметрах запуска мода. Это совершенно необязательно - просто ставим вас в известность. Это сообщение больше не появится.

