[tips-and-tricks-item-description]
rubia-briefing=[img=utility/warning_icon][img=utility/warning_icon][color=250,250,0][font=default-semibold]ВНИМАНИЕ![/font][/color][img=utility/warning_icon][img=utility/warning_icon] Грузовые капсулы и ракеты с людьми/грузами при входе/выходе из воздушного пространства Рубины будут получать СИЛЬНЫЕ повреждения от удара. Для транспортировки без повреждений необходимы [technology=rubia-project-trashdragon]/[technology=planetslib-rubia-cargo-drops]. Без них [color=250,250,0][font=default-semibold]ВЫ УМРЕТЕ ПРИ ПОСАДКЕ[/font][/color], если только не сможете выдержать большое количество повреждений от удара.\n\n[planet=rubia] • ветреная мусорная планета с ураганными ветрами. Ветер ограничивает ориентацию многих существ, а по поверхности постоянно летят мусороиды. Планета покрыта богатым ресурсами ломом, который можно переработать в полезные материалы с помощью микробов на [entity=biorecycling-plant]. Более подробную информацию вы получите по прибытии.\n\nПодсказка: Исследовав [technology=planet-discovery-rubia], вы уже сможете изготовить все необходимое.
rubia-trashsteroid-tips=Мусороиды — постоянная угроза на Рубии: [entity=medium-trashsteroid] бомбардируют базу, требуют турелей; наносят урон с шансом критического попадания; [entity=cargo-pod] получает серьёзные повреждения без [technology=planetslib-rubia-cargo-drops]; [entity=rocket-silo] не может запускать ракеты без [technology=rubia-project-trashdragon]; [entity=garbo-grabber] собирает [item=craptonite-chunk] только с мусороидов, уничтоженных физическим/взрывным уроном; некоторые объекты ([item=rail], [entity=rail-signal], [entity=rubia-armored-locomotive], объекты из [item=craptonite-frame]) неуязвимы к обстрелу; [entity=craptonite-wall] блокируют движение мусороидов, но не их появление, сами стены иммунны к ударам, другие объекты в АОЕ получают урон; технологии повышают живучесть [entity=medium-trashsteroid], но преимущества не так велики, как ожидалось; не смотреть на Рубию снижает нагрузку на UPS; исследуйте карту смело — оптимизация мусороидов снижает нагрузку на CPU.
rubia-wind-tips=Восточный ветер оказывает следующие эффекты:\n • [entity=inserter] и [entity=splitter] могут перемещать предметы только вправо.\n • [entity=transport-belt], [entity=underground-belt] и [entity=electric-mining-drill] не могут перемещать предметы влево. \n • [entity=logistic-robot] не может безопасно перемещаться к [entity=requester-chest], [entity=buffer-chest], [entity=active-provider-chest] или [entity=rocket-silo].\n   • [entity=locomotive], [entity=cargo-wagon], [entity=recycler], и связанные с ними не могут противостоять ветру.\n   •  Некоторые сущности имеют иммунитет к ветру, такие как [item=rail], [entity=rail-signal], [entity=rubia-armored-locomotive], связанные с ними сущности и любая сущность, сделанная с [item=craptonite-frame].\n   • [entity=rubia-wind-turbine] будет вырабатывать энергию..
rubia-crapapult-tips=[entity=crapapult] может уничтожить [color=250,250,0][font=default-semibold]почти любой предмет[/font][/color] стреляя в атмосферу Рубии.\nМногие технологии изучаются выстреливанием определенных предметов. [entity=crapapult] не военная разработка.
rubia-garbo-grabber-tips=Используйте физические/взрывные для уничтожения [entity=medium-trashsteroid] в радиусе [entity=garbo-grabber], чтобы собрать [item=craptonite-chunk].
rubia-craptonite-wall-tips=[entity=craptonite-wall] может заблокировать движение [entity=medium-trashsteroid].
