[mod-setting-description]
disable-lyrical-music=Включает режим доступности для людей с мусорным вкусом. По умолчанию он выключен, и играть в мод можно только так.
remove-rubia-from-promethium_sci=Если установить значение ВКЛ, то научный пакет Рубии не будет нужен для бесконечного исследования прометиевой науки и продуктивности исследований По умолчанию ВЫКЛ.
require-rubia-for-endgame-planets=Если установить значение ВКЛ, то для разблокировки эндшпильных планет, таких как Аквило, и модифицированных эндшпильных планет, таких как Мараксис, необходимо пережить страдания на Рубии. По умолчанию ВКЛ.

rubia-difficulty-setting=Делает некоторые аспекты Рубии проще или сложнее по отношению к мусороидам (здоровье, частота, урон...). Ресурсы и ремесло не затрагиваются. По умолчанию = Средняя.
rubia-rocketizer-early-unlock=Разблокируйте ракетизатор вместе с ракетными шахтами (как если бы Рубия не была установлена). Эта настройка предназначена для обратной совместимости с файлами сохранений, в которых был установлен "Rocket Cargo Insertion" до загрузки Рубии. Пожалуйста, не включайте эту опцию, если это не ваш случай. По умолчанию: ВЫКЛ.
invert-trashsteroid-scaling=Инвертировать масштаб мусоростероидов: при ударе они уменьшаются (а не растут). Только визуально. По умолчанию: ВЫКЛ
rubia-megabase-mode=Вкл. — мусоростероиды жрут меньше UPS, становясь неподвижными, но ТОЛЬКО когда их очень много. Меняет механику. По умолчанию: ВЫКЛ
rubia-tech-cost-multiplier=Технологии триггеров Рубии игнорируют стандартный множитель стоимости технологий. Этот параметр умножает их стоимость отдельно. Больше цифра — дороже технология. По умолчанию = 1
rubia-zoom-change=Если выключено, глазные капли не будут действовать. По умолчанию: ВКЛ.
rubia-renai-special-trajectories=Вкл. — швыряющие манипуляторы на Рубии получают уникальные траектории. Увеличивает нагрузку на UPS в Renai Transportation. По умолчанию: ВКЛ.
rubia-buttplug-integration=Рубия умеет общаться с твоим батплагом через Intiface Central. Если включить эту настройку, Рубия будет дёргать твой батплаг во время катсцен, при порывах ветра, в случайные моменты и при подрыве мусоростероидов. Как настроить: Нужен запущенный Intiface Central (https://intiface.com/). Читай краткий гайд на www.buttplug.io. Также придётся скачать родной коннектор CuButt с гитхаба и следовать тамошней инструкции (https://github.com/ashkitten/factorio-cubutt/tree/mistress). Работает только на Linux.

