rci-rocketizer=Umieść [entity=rci-rocketizer] obok [entity=rocket-silo]. Wszystkie włożone do niego przedmioty zostaną przeniesione do ładunku rakiety. Pozwala na eksport materiałów używanych do części rakiet (takich jak [item=craptonite-frame]) bez użycia [entity=logistic-robot].

