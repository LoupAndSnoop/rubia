[item-description]
biorecycling-science-pack=Pachnie postępem.
makeshift-biorecycling-science-pack=Metalowe odłamki ordynarnie chlupoczą w rzadkiej brązowej cieczy. Tylko tyle i aż tyle.
ghetto-biorecycling-science-pack=Metalowe odłamki utknęły w gęstym brązowym szlamie. Jesteś o krok od przełomu, ale to jeszcze nie to.
rubia-biofusion-science-pack=Bezbożna mikstura będąca koktajlem złożonym z DNA przeróżnych form życia z odelgłych planet. Po wyprodukowaniu jest zawsze świeża.

rubia-cupric-scrap=Mieszanka pozornie losowych śmieci bogatych w miedź.
rubia-ferric-scrap=Mieszanka pozornie losowych śmieci bogatych w żelazo.
rubia-bacteria-A=Nazwałeś ją tak, ponieważ szybko trawi złom.
rubia-bacteria-B=Nazwałeś ją tak, ponieważ metodycznie trawi śmieci.
craptonite-chunk=Gruda materiału utwardzonego poprzez ciągłe bombardowanie powierzchni Rubii.
craptonite-frame=Najwytrzymalszy materiał w galaktyce został przekształcony w funkcjonalną, porowatą strukturę.

rubia-wind-turbine=Wykorzystuje siłę wiatru, aby wytwarzać prąd.
garbo-grabber=Zbiera [item=craptonite-chunk] ze śmieciosteroidów zniszczonych w jego zasięgu, używając zwykłej lub wybuchowej amunicji.
crapapult=Rzuć swoje troski na wiatr i pozbądź się zbędnych przedmiotów. Teraz to ty stałeś się częścią problemu.


