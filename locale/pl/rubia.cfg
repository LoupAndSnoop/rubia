[version-change-warnings]
rubia-trashsteroid-health-scaling=(Loup&Snoop / Rubia): No więc... nie gniewaj się, ale naprawiłem błąd, przez który życie śmieciosteroidów nie skalowało się tak mocno, jak powinno przy wysokim poziomie technologii związanych z obrażeniami broni... Całkowicie zrozumiały błąd! Dodałem też ustawienia trudności w opcjach mapy - jeśli twoja baza nagle zacznie wybuchać, skorzystaj z nich. Powodzenia!
rubia-craptonite-wall=(Loup&Snoop / Rubia): Dobre wieści! Mury z szajsonitu zostały wzmocnione w najnowszej aktualizacji. Szczegóły znajdziesz w opisie technologii lub w Poradach i Wskazówkach.
rubia-craptonite-wall-recipe=(Loup&Snoop / Rubia): Ogłoszenie: formuła murów z szajsonitu została zmieniona, a formuła na rubiański beton została usunięta.
rubia-factorissimo-destruction_warning=(Rubia): Fabryki z moda Factorissimo zostaną zniszczone na Rubii za __1__ minut.
;rubia-factorissimo-destruction-position=Factorissimo factories on Rubia moved to: [gps=__1__,__2__,__3__]
rubia-bzmod-silo-recipe-change=(Rubia): Ostrzeżenie: Rubia właśnie zmieniła formuły silosów dla paczki modów BZ. Podstawowa receptura ponownie wykorzystuje lut.

rubia-tangible-projectile-mod-warning=(Loup&Snoop / Rubia): Ostrzeżenie: używasz moda, który sprawia, że pociski stają się fizycznymi obiektami. To znacząco podnosi trudność Rubii ponad zamierzone wartości.
rubia-tech-cost-multiplier-warning=(Loup&Snoop / Rubia): Grasz z mnożnikami kosztu technologii, ale Rubia korzysta z domyślnego x1. Technologie wyzwalające postęp na Rubii mają własny, osobny mnożnik w ustawieniach. Tak tylko daję znać. Ta wiadomość się więcej nie pojawi.

