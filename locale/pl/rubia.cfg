[mod-setting-description]
disable-lyrical-music=Włącza tryb dostępności dla ludzi o fatalnym guście muzycznym. Domyślnie WYŁĄCZONE.
remove-rubia-from-promethium_sci=Jeśli WŁĄCZONE, rubiański pakiet naukowy NIE będzie potrzebny do badań nad wydajnością produkcji prometu. Domyślnie WYŁĄCZONE.
require-rubia-for-endgame-planets=Jeśli WŁĄCZONE, ukończenie Rubii jest konieczne do odblokowania planet końcowych, takich jak Aquilo ORAZ zmodowanych planet końcowych, takich jak Maraxsis. Domyślnie WŁĄCZONE.

rubia-difficulty-setting=Zwiększa punkty życia śmieciosteroidów, zadawane przez nie obrażenia oraz ilość obrażeń odniesionych przez inżyniera przy lądowaniu na planecie. Zasoby i formuły nie ulegają zmianie. Domyślnie = Normalny.\n[img=utility/warning_icon]OSTRZEŻENIE: 'Pyanodons' wymaga fulgoriańskich technologii, by w ogóle móc wylądować na Rubii.\n[img=utility/warning_icon]OSTRZEŻENIE: "Inżynier Musi Zginąć" dodatkowo wymaga posiadania wyposażenia w jakości [quality=epic], by przeżyć lądowanie.
rubia-rocketizer-early-unlock=Odblokuj rakietownik wraz z silosami rakietowymi (tak jakby Rubia nie była zainstalowana). To ustawienie służy do kompatybilności wstecznej. Domyślnie WYŁĄCZONE.
invert-trashsteroid-scaling=Odwraca skalowanie śmieciosteroid, by stawały się mniejsze przy uderzeniu (zamiast większe). Ustawienie czysto wizualne. Domyślnie WYŁĄCZONE.
rubia-megabase-mode=Jeśli włączone, unieruchamia śmieciosteroidy, co przekłada się na mniejsze zużycie UPS. Działa TYLKO gdy pojawia się ich bardzo dużo. Wpływa to na rubiańską mechanikę rozgrywki. Domyślnie WYŁĄCZONE.
rubia-tech-cost-multiplier=Technologie wyzwalające postep na Rubii są odporne na standardowe ustawienia mnożnika kosztu badań. To ustawienie mnoży koszt tych technologii. Większa wartość = wyższy koszt. Domyślnie = 1.
rubia-zoom-change=Jeśli wyłączone, krople do oczu nie będą miały żadnego efektu. Domyślnie WŁĄCZONE.
rubia-renai-special-trajectories=Jeśli włączone, podajniki rzucające na Rubii będą miały unikalne trajektorie. Zwiększa to koszt UPS dla Renai Transportation. Domyślnie = WŁĄCZONE.
rubia-buttplug-integration=Rubia może łączyć się z Twoim buttplugiem za pośrednictwem Intiface Central. Włączenie tej opcji sprawi, że Rubia będzie aktywować urządzenie podczas przerywników filmowych, powiewów wiatru, losowych zdarzeń lub niszczenia śmieciosteroidów.\n\nInstrukcja: Do działania wymagany jest uruchomiony program Intiface Central (https://intiface.com/). Zapoznaj się z instrukcją szybkiego startu na www.buttplug.io. Musisz pobrać natywny konektor CuButt z serwisu GitHub i postępować zgodnie z instrukcjami (https://github.com/ashkitten/factorio-cubutt/tree/mistress). Kompatybilne tylko z systemem Linux.

