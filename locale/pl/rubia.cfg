[achievement-description]
land-on-rubia=Wyląduj na Rubii, nie tracąc przy tym życia.
research-with-biorecycling=Zbadaj technologię używając biorecyklingowych pakietów naukowych.
rubia-lore-complete=Zdobądź całą wiedzę o planecie, eksplorując stosy śmieci na Rubii.
rubia-easy-mode=Wybierz odpowiedniejszy poziom trudności dla Rubii.
rubia-very-very-hard-clear=Ukończ Rubię na poziomie trudności "Inżynier Musi Zginąć" - od lądowania aż po start.

