medium-trashsteroid=Odpady rzucane przez wiatr z dużą prędkością. Ich punkty wytrzymałości skalują się wraz z poziomem technologicznym twoich broni. Śmieciosteroidy mają niewielką szansę na trafienie krytyczne.


