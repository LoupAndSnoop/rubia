pre-rubia-cutscene-prepared=Czujesz się gotowy na Rubię, ale czy Rubia jest gotowa na Ciebie?
pre-rubia-cutscene-unprepared=Masz przeczucie, że jesteś zbyt słabo uzbrojony na Rubię - jakbyś przed odlotem przeoczył jakiś kluczowy fragment wiedzy, który teraz zaczyna ciążyć bardziej niż cały ekwipunek.
pre-rubia-cutscene-unprepared-naked=Czujesz dreszcz na plecach. Jesteś kompletnie nagi, ta podróż skończy się pewną śmiercią.
pre-rubia-cutscene-unprepared-low-shield=Czujesz się niemal nagi. Nie masz ani odrobiny ochrony, by przetrwać lądowanie na Rubii.
pre-rubia-cutscene-unprepared-medium-shield=- Masz wrażenie, że dysponujesz tylko połową sprzętu potrzebnego, by przeżyć lądowanie na Rubii.
pre-rubia-cutscene-unprepared-almost-shield=Masz wrażenie, że dzieli cię już tylko krok od bezpiecznego lądowania.
pre-rubia-cutscene-unprepared-too-close=Nie masz pewności, czy przeżyjesz lądowanie. Trudno to ocenić...


;⚠️ = [img=utility/warning_icon]
landing-cutscene-part1=[img=utility/danger_icon] Kadłub naruszony
landing-cutscene-part2=[img=utility/danger_icon] Silniki lądownicze zniszczone
landing-cutscene-part3=[img=utility/danger_icon] Silniki awaryjne uszkodzone. Przygotować się na uderzenie
on-player-died-on-entry=Zginąłeś od poważnych obrażeń przy uderzeniu podczas wejścia w atmosferę planety. Musiałbyś wytrzymać więcej, by przetrwać tę podróż.
landing-cutscene-abort-external-mod=(Rubia): Nie możesz wylądować na Rubii bez solidniejszej ochrony. Korzystasz z moda omijającego podróże kosmiczne, ale wciąż musisz spełnić wymogi bezpiecznego lądowania.

promethium_warning=⚠️ Masz zbadaną nieskończoną wydajność produkcji prometu, a Rubia dodała swój pakiet naukowy do jej kosztu. Możesz to przełączyć w ustawieniach moda, jeżeli chcesz aby było inaczej. To ostrzeżenie więcej się nie pojawi na tym zapisie gry.
promethium_warning-part2=⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️
rocketizer-warning=⚠️ Miałeś __ENTITY__rci-rocketizer__ w bazie przed instalacją Rubii. Rubia zmodyfikuje wymogi odblokowania oraz formułę tego przedmiotu. Możesz to zmienić w ustawieniach moda. To ostrzeżenie więcej się nie pojawi na tym zapisie gry.


rubia-rocket-silo-setting-warning=[img=utility/danger_icon]OSTRZEŻENIE: [entity=logistic-robot] nie mogą nawigować do silosów rakietowych na Rubii. Wyłączam automatyczne żądania logistyczne.

[rubia-crapapult]
yeet-item=Wystrzel __1__
yeet-recipe=Wystrzel __1__
yeet-item-description=Wystrzel __1__ używając szajsapulty.
yeet-recipe-description=Wystrzel __1__ używając szajsapulty.


[rubia-lore]
rubia-notice-prestring=(Rubia)
spidertron-mine-hint-part1=Znajdujesz dziwną bakterię trawiącą metalową ramę spidertrona. Bez wahania nazywasz ją [font=compi]'__ITEM__rubia-bacteria-A__'[/font], nie przejmując się tym, co pomyślą inni.
spidertron-mine-hint-part2=Nie możesz przestać myśleć o tamtym wraku. To właśnie on zainspirował cię do zbudowania dużego działa [font=compi]rzucającego niechciane przedmioty na wiatr.[/font] Nazywasz swój projekt [font=compi]"__ENTITY__crapapult__"[/font] i chichoczesz ze swojej błyskotliwej gry słów.
spidertron-mine-part1=Ten spidertron miał ustawione żądanie logistyczne dotyczące jakiegoś sześcianu.
spidertron-mine-part2=W ładunku spidertrona znalazłeś sfatygowaną "Kartę Praw Rubiańczyka". Bezużyteczna, rzucasz ją z powrotem na wiatr.
spidertron-mine-part3=W ładunku spidertrona znajdujesz dysk z opisem: "Podróżowanie szybciej od światła: Koncepcja Sześcianu" Jest nieodwracalnie uszkodzony i rozpada się w dłoniach.
spidertron-mine-part4=Po przeszukaniu wszystkich tych spidertronów staje się jasne, że sześcian — jeśli kiedykolwiek tu był — na pewno nie znajduje się już na tej planecie.
spidertron-mine-destroyer-trap=Przeszukując spidertrona, przypadkowo aktywujesz kapsuły niszczycieli ukryte w środku.
spidertron-mine-destroyer-trap-2=Zastanawiasz się, co musiało się dziać na Rubii, skoro potrzebne były całe zastępy niszczycielskich robotów.


train-stop-mine-part1=Przy zardzewiałym przystanku leży notatka: "Źle policzyłem proporcje. Jak w Breaking Bad, tylko bez happy endu."
train-stop-mine-part2=Na słupku ktoś z uporem maniaka wyrył: "MUSIMY ZBUDOWAĆ WIĘCEJ ZIKKURATÓW!"
train-stop-mine-part3=Ten przystanek nazywał się kiedyś "Woodstock".
train-stop-mine-part4=Notatka od "Sa□eta" szczegółowo opisuje wysiłki ukrycia jego taśmociągomanii przed współpracownikami.
train-stop-mine-part5=Pod przystankiem znajdujesz podartą książkę: "Anomancja: Traktat o czytaniu z fałd i zmarszczek odbytu"
train-stop-mine-part5-2=Po przekartkowaniu kilku stron wiatr wyrywa ci ją z rąk. Zastanawiasz się, czy PDF krąży gdzieś w odmętach internetu.
train-stop-mine-part6=W zgliszczach trafiasz na nagranie. Niestety wygląda jakby przejechał po nim pociąg. Wysyłasz je więc do bazy głównej - niech tam się z tym męczą.
train-stop-mine-part6-2=Analiza nagrania dobiegła końca. Wynika z niej, że niejaki "Ha□ai" próbował zbudować kolej aż do "końca świata". Czy mu się udało? Cóż... wygląda na to, że nawet nagranie tego nie wie.
train-stop-mine-part7=Trafiasz na dokumenty dotyczące technologii tłumienia wiatru. Niestety są pokryte odchodami, co sugeruje, że poprzedni czytelnik miał w tym temacie dość zdecydowaną opinię.
train-stop-mine-part8-rand1=Na przystanku było pudełko z "jivolitem". Zazdrościsz, że ktoś pierwszy nazwał minerał tak pretensjonalnie, więc miażdżysz pudełko jak recenzje polskich produkcji na Filmwebie.
train-stop-mine-part8-rand2=Na przystanku było pudełko z "bobmonium". Miażdżysz je z zazdrości - ktoś nadał temu minerałowi nazwę gorszą niż twoje przekłady zagranicznych tytułów filmowych.
train-stop-mine-part8-rand3=Na przystanku było pudełko z "immersytem". Porzucasz je z lekkim smutkiem, wiedząc, że sam nadałbyś temu minerałowi znacznie zabawniejszą nazwę.
train-stop-mine-part8-rand4=Na przystanku było pudełko ze "stupidium". Ale głupia nazwa - brzmi jak pierwiastek odkryty przez ekipę Monty Pythona.
train-stop-mine-part8-rand5=Na przystanku było pudełko z "nexelitem". Wygląda na bardziej skomplikowane niż regulamin TikToka, więc powoli się wycofujesz.
train-stop-gun-turret-trap=Grzebiesz w złomie i trafiasz na działko podpisane "Własność Ba□ego". Jeden nieostrożny ruch i... świetnie. Właśnie je obudziłeś.


;junk-mine-hint-part1=Combing through the wreckage gives you inspiration for a large gun to shoot unwanted items out into the wind. You call your design the __ENTITY__crapapult__.
junk-mine-part1=W tej stercie znajdujesz projekt podpisany "Rozwiązanie wszelkich problemów". Nie ma sensu, dopóki nie obrócisz go o 45°. Po chwili orientujesz się, że to tylko mem z kotem. Wkurzony rzucasz go na wiatr.
;In this pile, you see a broken pump with a filter set to a fluid you've never seen before.
junk-mine-part2=Przy składowisku leży dzieło sztuki artysty o imieniu "Ża□a". Chowasz je szybko - wygląda jak coś, co krytycy nazwaliby "odważnym", a znajomi "nienormalnym".
junk-mine-part3=W tej stercie znajdujesz spisaną na kartce recenzję moda do Factorio: "Maraxsis: 3/10. Za dużo wody".
junk-mine-part4-rand1=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "Jul□□□, □□ali, Lo□□ i □□ppy". Zdjęcie tak rozmazane, że wygląda jak screenshot z Nokii 3310.
junk-mine-part4-rand2=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "□□□vik, Ju□□□□, □□garre i Buf□□□". Nie masz pojęcia, kim są, ale życzysz im, żeby nie skończyli jak obsada czwartego sezonu Big Brothera.
junk-mine-part4-rand3=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "De□□□□□r, □0X, □□□□hiri i □earw□□□". Brzmi jak skład drużyny, która odpadła w półfinale turnieju e-sportowego
junk-mine-part4-rand4=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "Sa□et, Ha□ai, Ża□a, Ba□y". Zastanawiasz się, czy nadal mają wspólnego Discorda.
junk-mine-part4-rand5=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "Grak□□□□, □□□□eymint, Ma□□, □□□□wuka". Zdjęcie pachnie pizzą. Dosłownie. To trochę niepokojące.
junk-mine-part4-rand6=Znajdujesz roztrzaskaną ramkę. Z tyłu podpis: "Be□□□, □□□cado, Recor□□□, □□□box". Nie znasz ich, ale brzmią jak zespół, który grałby na openerze w 2077.
junk-mine-part5=W tym stosie znajdujesz fragment "Plumbusa". Nie masz pojęcia, do czego służy, ale wygląda na solidną ręczną robotę. I to taką, której nikt nie powinien oglądać.
junk-mine-part6-rand1=Znajdujesz zepsutą gitarę. Z tyłu wyryty napis: "□□□□□□ Dan". Instrument tak styrany, jakby ktoś próbował na nim grać Smoke on the Water przez 20 lat bez przerwy.
junk-mine-part6-rand2=Znajdujesz zepsutą gitarę. Z tyłu wyryty napis: "JJ". Pokryta kolorowymi wzorami, jakby właściciel próbował zostać gwiazdą psychodelicznego rocka, ale zabrakło mu budżetu.
junk-mine-part6-rand3=Znajdujesz zepsutą gitarę. Z tyłu wyryty napis: "□□□□□rat". Zużyta tak bardzo, że wygląda jakby przeszła trasę koncertową przez cztery wymiary.
junk-mine-part7=W tym stosie znajdujesz twardy jak skała toroid, w podartym opakowaniu z paragonem dla "Lau□□□□". Niestety - pleśń zrobiła z niego artefakt, a nie przekąskę.
junk-mine-grenade-trap=Pudełko z etykietą '□□ig□□□□/□□_□rt'. Otwierasz je zbyt energicznie i cała zawartość wyskakuje jak z koszmarnego lootboxa.
junk-mine-grenade-trap-2=Zawartość pudełka została rozerwana przez wybuch. W środku były jakieś akta, ale teraz wyglądają jak dokumenty z archiwum X po spotkaniu z blenderem.

all-lore-done=Masz wrażenie, że wszystkie ciekawostki już wygrzebałeś. Reszta to tylko śmieci... nawet jak na rubiańskie standardy.
;deprecated=Symbols were carved into this train stop: "🦶📸🍆💦". You don't know what it means, but still feel disgusted.

[rubia-taunt]
forgot-roboport-failsafe=(Loup&Snoop) Zapomniałeś zabrać podręczny roboport na Rubię. Zajrzyj do ekwipunku.
forgot-roboport-failsafe-part2=(Loup&Snoop) Ale ten roboport nie jest za darmo. Zjadam twoją lewą nogę jako rekompensatę.

rubia-first-blast-off-part1=(Rubia): I tak inżynier wystartował w swojej żenującej rakiecie, żądny odkrywania nowych materiałów i planet, podekscytowany perspektywą nadawania im jeszcze gorszych nazw niż te, które wymyślił na Rubii.
rubia-first-blast-off-part2=(Rubia): We wszechświecie naprawdę nie ma już miejsca, które byłoby przed tobą bezpieczne.
rubia-first-blast-off-part3=(Loup&Snoop): Gratuluję ukończenia Rubii. Zawsze w ciebie wątpiłem.
rubia-first-blast-off-part4-mp=(Loup&Snoop): Aha, już wszystko jasne. Dzięki wszystkim za wsparcie i za to, że dowieźliście __1__ do zwycięstwa. Sam raczej by tego nie przeżył.
rubia-first-blast-off-part5-mp=(Loup&Snoop): Nie no, serio. __1__ był bezczynny przez ponad godzinę, podczas gdy reszta odwaliła większość roboty.

