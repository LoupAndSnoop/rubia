[technology-description]
;Anything dropping from orbit will be bombarded with garbage and take severe impact damage. Normal rockets taking off from the surface are also not safe. Better technology is needed to deal with it. 
planet-discovery-rubia=Wietrzna planeta zasypana śmieciami. Niska grawitacja i potężne wichry nieustannie unoszą porozrzucane szczątki i miotają nimi z ogromną prędkością - także na niskiej orbicie. Żyją tu pomocne mikroby, które pozwalają przetwarzać złom na bardziej użyteczne materiały.\n[img=utility/warning_icon]Zobacz [font=default-semibold]"Porady i Wskazówki"[/font], aby zapoznać się z odprawą dotyczącą tej planety.
operation-iron-man=Zaawansowane systemy naprowadzania oraz opancerzone kapsuły pozwalają bezpiecznie zrzucać kontenery towarowe przez wrogą przestrzeń powietrzną Rubii.

rubia-unknown-technology=Musisz przeprowadzić więcej badań na Rubii, aby zobaczyć, co cię czeka.
rubia-progression-stage1=Odkryłeś bakterię, która zjada złom i nazwałeś ją __ITEM__rubia-bacteria-A__. Cóż… nauka na tej planecie rządzi się własnymi prawami.
rubia-progression-stage1B=Stań się jednością z odpadami. Mając podstawową wiedzę o szajsapultach, jesteś gotów postawić swoją pierwszą śmieciobazę.
rubia-progression-stage2=Sumienne studiowanie śmieciologii zaowocowały odkryciem niespodziewanego kompana - małego stworka, którego z dumą nazwałeś __ITEM__rubia-bacteria-B__.
rubia-progression-stage3=W pełni zrozumiałeś śmieci. Kąpałeś się w nich. Zostałeś przez nie ukształtowany. Teraz jesteś gotów wynieść swoje szajso-umiejętności na wyższy poziom.
craptonite-processing=To, że odkryłeś najbardziej wytrzymały materiał w galaktyce i teoretycznie możesz nazwać go jak chcesz, nie znaczy, że powinieneś.
rubia-armored-train=W końcu możesz budować pociągi zdolne stawić czoła rubiańskim wichrom.
rubia-project-trashdragon=Zbuduj opancerzone rakiety odporne na intensywny grad odłamków w rubiańskiej przestrzeni powietrznej.

rubia-scrapapalooza=Lepsze niż Złomtoberfest, a też ma "złom" w nazwie.
rubia-sniper-turret=Nooby ulepszają, żeby mieć większy zasięg. Prosi ulepszają, żeby mieć lepszy UPS i mniejszy hałas.
rubia-postgame-biorecycle-part1=Tylko prawdziwy śmieciowy dyktator jest w stanie docenić, jak wszechstronne potrafią być te bakterie.

rubia-long-bulk-inserter=Wyposaż długoramienne podajniki w wytrzymałą ramę z szajsonitu, która poradzi sobie z ogromnym momentem obrotowym podczas szybkiego przenoszenia dużych ilości przedmiotów.
rubia-long-stack-inserter=Klejnot koronny Rubii. Dzięki wytrzymałej ramie z szajsonitu, ciężkiej uranowej podstawie i elastycznym chwytakom z włókna węglowego ten podajnik stosowy może sprawnie przenosić stosy przedmiotów na większe odległości. Jest jednak wolniejszy niż standardowy podajnik stosowy.

craptonite-wall=Wykorzystaj trwałość szajsonitu, by tworzyć najwytrzymalsze struktury obronne w galaktyce. Te mury potrafią zatrzymać nawet [entity=medium-trashsteroid].
craptonite-axe=Zastąp swój beznadziejny stalowy topór wytrzymałym toporem z szajsonitu, który znacznie usprawni wydobycie. Odblokowuje dostęp do różnych akcesoriów z szajsonitu.

rubia-efficiency-module4=Podłączenie szajsolitycznego konwertera rozwściecza neutrony w cząsteczkach zanieczyszczeń, prowadząc do ich gwałtownej dezintegracji oraz emisji charakterystycznego, słodkiego aromatu szajsonitu.
rubia-holmium-craptalysis=Gdy ruda trafia do szajsolitycznego konwertera, atomy holmu czują się tak dotknięte, że natychmiast próbują uciec, przez co szybciej przenikają do roztworu.

craptonite-productivity=Twoje uprawnienia do nadawania nazw właśnie wygasły. Nazywamy to "Rubiańska produktywność" i musisz to zaakceptować.
rubia-braking-force-8=Twoje pociągi ledwo zipią, a ja czuję narastającą potrzebę prędkości.

rubia-biofusion-science-pack=Ostateczne wyzwanie Rubii: stworzenie bezbożnej mikstury będącej koktajlem złożonym z DNA przeróżnych form życia z odelgłych planet. Opcjonalne.
rubia-biofusion-science-pack-removed=Usunięcie planety Gleba z rozgrywki blokuje dostęp do końcowej zawartości odblokowywanej na Rubii. Trochę mi cię szkoda.\nPrzyczyny: __1__
rubia-nutrients-from-sludge=Opanuj filtrowanie i przetwarzanie związków organicznych ze szlamu bakteryjnego, aby wytwarzać z nich biopaliwo na Rubii.
rubia-nutrient-productivity=Zwiększa wydajność wytwarzania składników odżywczych.
rubia-biochamber-productivity-bonus=Twoje bogate doświadczenie w pracy z materiałami biologicznymi pozwala ci wydajniej korzystać z biokomory.
rubia-biofusion-promethium-science-pack=Wykorzystaj swoją wiedzę z zakresu biologii międzyplanetarnej, aby wydajniej wytwarzać __ITEM__promethium-science-pack__.
rubia-cargo-landing-pad-capacity=Twoje doświadczenie w kierowaniu zrzucanym ładunkiem przez wrogą przestrzeń Rubii pozwala postawić jedno dodatkowe lądowisko towarowe na każdej planecie.
rubia-bio-utility-science-pack=Twoja wiedza biologiczna pozwala ci dostrzegać iskrę życia nawet w robotach! Dzięki temu wytwarzasz użytkowe pakiety naukowe w biokomorze z większą wydajnością. A teraz prosimy o wyjaśnienia - jakim cudem to w ogóle działa, Panie Ekspercie?
rubia-bio-flying-robot-frame=Twój chory, pokręcony umysł wyobraża sobie bakterie wytwarzające szkielety latających robotów, używając do tego swoich mikroskopijnych rączek. Części marnują bez opamiętania, ale tempo mają imponujące.

;Craptonite tools
rubia-craptonite-boots=Buty wzmocnione szajsonitem, z holmowymi podeszwami, które pozwalają ci szybciej biegać. A szajsonitowe wkładki? O tak - poczujesz je przy każdym kroku.
rubia-craptonite-hook=Karwasz z szajsonitu wyposażony w potężny mechanizm wystrzeliwujący wolframowy hak z łańcuchem, pozwalający sięgać przedmiotów z większej odległości.
rubia-craptonite-satchel=Solidna torba wykonana z mocnego włókna węglowego i wzmocniona szajsonitową ramą, dzięki czemu pomieści jeszcze więcej śmieci.
rubia-craptonite-cannister=Przechowuj butelkę schłodzonej wody po kąpieli Uroczej Niewiasty w kanistrze wzmocnionym szajsonitem. Dzięki akwilejskiej kriogenice wystarczy jeden łyk, by poczuć przypływ energii… i lekkie mdłości.
rubia-craptonite-eyedrop=Twoje oczy pieką, gdy nasiąkają wodą po kąpieli Uroczej Niewiasty - wszystko po to, by mogła wzmocnić twój wzrok. Niewiasta żąda daniny za Swe błogosławieństwo. W ustawieniach modyfikacji możesz odrzucić Jej hojność.
;Other mods
rubia-craptonite-circlet=Potężny diadem z szajsonitu, inkrustowany grudą najwspanialszego moshitu w galaktyce. Masz wrażenie, że pomaga ci porozumiewać się z maszynami.
rubia-craptonite-earring=Kolczyk z szajsonitu, inkrustowany plutonem, który zapewnia ci ciepło i kieruje neutrony dokładnie tam, gdzie trzeba.
rubia-craptonite-glove=Rękawice z platynowym katalizatorem na szajsonitowym podłożu, pozwalające szybciej wytwarzać przedmioty.
rubia-craptonite-lamp=Załóż na skafander energooszczędną żarówkę. Szajsonitowa rama wytrzyma każde ciśnienie i oświetli nawet najmroczniejsze głębiny.
rubia-craptonite-belt-buckle=Zrób klamrę paska z szajsonitu, inkrustowaną cennym meteorytem z Muluny. Kosmiczna energia osobiście dopilnuje, aby twoje spodnie nie spadły.
rubia-craptonite-bracer=Sześcian sześcian sześcian sześcian, sześcian Sześcian sześcian sześcian--sześcian sześcian Sześcian sześcian. Sześcian, sześcian, sześcian sześcian sześcian Sześcian! Sześcian sześcian sześcian sześcian sześcian sześcian sześcian... sześcian? SZEŚCIAN!!!?!? Sześcian sześcian sześcian Sześcian sześcian sześcian; Sześcian, Sześcian sześcian. sześcian sześcian sześcian sześcian (sześcian sześcian Sześcian), sześcian Sześcian sześcian sześcian? SZEŚCIAN/sześcian/sześcian sześcian Sześcian sześcian sześcian: sześcian, sześcian, Sześcian, sześcian, sześcian. Sześcian sześcian sześcian.
rubia-craptonite-hip-replacement=Wątpliwymi metodami zastąp staw biodrowy wytrzymałym przegubem kulowym z szajsonitu, przymocowanym do kości jahtrańskim tytanem. Silniejszy staw pozwala dźwigać większe ciężary, [font=default-tiny-bold]choć wiąże się to z kilkoma zniekształcającymi ciało skutkami ubocznymi.[/font]
rubia-craptonite-codpiece=Zwiększ pewność siebie lśniącym złotym suspensorem, który krzykliwie chroni twoje klejnoty rodowe ramą z szajsonitu. To stałe przypomnienie, by najlepiej wykorzystywać to, co masz - nawet jeśli nie jest tak imponujące, jak byś sobie tego życzył.
rubia-craptonite-wood-charm=Szajsonitowy karabińczyk pozwala tym szlachetnym drewnianym amuletom dyndać u twojego boku, domagając się szacunku od każdego drzewa, które napotkasz.
rubia-craptonite-mask=Ta krzykliwa maska sprawia, że zaczynasz wierzyć, iż potrafisz patrzeć poza czas.
;rubia-craptonite-sunglasses=Zabłyśnij swym cuchnącym gustem w tych szykownych okularach przeciwsłonecznych z etycznie pozyskiwanego szajsonitu. Soczewki te pozwalają dostrzec miriady barw płonącego diesla.
rubia-craptonite-sunglasses=Zabłyśnij swym cuchnącym gustem w tych szykownych okularach przeciwsłonecznych z etycznie pozyskiwanego szajsonitu. Diamentowe soczewki sprawiają, że masz wrażenie, jakbyś widział naprężenia w różnych materiałach.
rubia-craptonite-tiber-implant=Ten implant boleśnie wbija igły w twoją skórę, zapewniając, że twoja krew pozostaje w stałym, intymnym kontakcie z Tyberium. Dzięki temu zaczynasz dostrzegać Tyberium we wszystkim.
rubia-craptonite-grillz=Pokaż wszechświatowi, że twoje bezguście nie zna granic, nosząc cynkowy grill na zęby wzmocniony szajsonitem. Twoja szczęka zdaje się przewodzić niemal wszystko dzięki temu "ulepszeniu".
rubia-craptonite-stopwatch=Wytworzyłeś ten stoper z wielu maleńkich części z egzotycznych aktynowców, upakowanych w szajsonitowej obudowie. Świecąca tarcza może i nie grzeszy stylem, ale pozwala być punktualnym na każdy rozpad atomu. A radioaktywność? Spokojnie - stoper na pewno przetrwa dłużej niż ty.
rubia-craptonite-rainbow-brooch=Ta fikuśna ozdoba z szajsonitu podtrzymuje potężny pryzmatyczny klejnot, który sprawia, że noszący wyraźnie promienieje.

rubia-craptonite-carrot=Rabbaskańsa maszyneria tego złącza pochłania słabe sygnały energii, a szajsonitowe wnętrze wytrzymuje ciągłe, gwałtowne wibracje podczas przesyłania mocy do użytkownika.

rubia-progression-stage1-compat-k2so=Duch Krastora płynie w twoich żyłach. Starożytna bakteryjna wiedza, używana do tworzenia kompletnie bezużytecznych wihajstrów, powoli przenika przez twoją grubą czaszkę.

[modifier-description]
rubia-project-trashdragon=Umożliwia start rakiet z powierzchni Rubii.
operation-iron-man-effect=Kontenery towarowe z graczami lub ładunkiem mogą bezpiecznie lądować na Rubii.
biofusion-bacteria-release=Propagacja kluczowych bakterii z Gleby nie jest już ograniczona wyłącznie do powierzchni.
rubia-craptonite-lamp=Zwiększony zasięg światła wokół postaci w rowie oceanicznym.
rubia-bio-utility-science-pack-unlock=__ITEM__utility-science-pack__ może być teraz wytwarzany w biokomorze z wyższą wydajnością.
cargo-landing-pad-count=Lądowiska towarowe per planeta: +__1__
rubia-zoom-modifier=Zasięg zoomu +__1__%

rubia-sniper-turret-attack-bonus=Obrażenia działka snajperskiego: +__1__

