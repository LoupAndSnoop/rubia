[tips-and-tricks-item-description]
rubia-briefing=[img=utility/warning_icon][img=utility/warning_icon][color=250,250,0][font=default-semibold]OSTRZEŻENIE![/font][/color][img=utility/warning_icon][img=utility/warning_icon] Pasażerowie w kontenerach towarowych odniosą POWAŻNE obrażenia podczas wejścia w przestrzeń powietrzną Rubii. Bezpieczne zejście z orbity wymaga odpowiedniej wytrzymałości, inaczej [color=250,250,0][font=default-semibold]ZGINIESZ PRZY LĄDOWANIU[/font][/color]. Technologie wymagane do opracowania [technology=planet-discovery-rubia] pozwalają wytworzyć sprzęt niezbędny do bezpiecznego lądowania, a po ukończeniu Rubii [technology=planetslib-rubia-cargo-drops] umożliwi swobodne podróże bez dodatkowego sprzętu.\n\n[planet=rubia] to śmieciowa planeta z huraganowymi wiatrami, które ograniczają ułożenie wielu obiektów i zasypują powierzchnię śmieciosteroidami. Planeta jest pokryta zasobnym złomem, który można przetwarzać mikrobami w [entity=biorecycling-plant]. Gruz w atmosferze uniemożliwia bezpieczny start rakiet bez opracowania [technology=rubia-project-trashdragon] oraz bezpieczne zrzuty kontenerów towarowych bez [technology=planetslib-rubia-cargo-drops].
rubia-trashsteroid-tips=Śmieciosteroidy to wszechobecne zagrożenie:\n   • [entity=medium-trashsteroid] bombardują bazę - działka są niezbędnę, by się przed nimi bronić.\n   • Spadające śmieciosteroidy zadają obrażenia, z niewielką szansą na trafienie krytyczne.\n   • Kontenery towarowe odniosą POWAŻNE obrażenia przy lądowaniu bez opracowania [technology=planetslib-rubia-cargo-drops].\n   • [entity=rocket-silo] nie wystrzelą rakiety bez opracowania [technology=rubia-project-trashdragon].\n   • [entity=garbo-grabber] zbiera [item=craptonite-chunk] tylko ze śmieciosteroidów zniszczonych fizycznie lub poprzez eksplozję.\n   • Niektóre obiekty są odporne na bombardowanie: [item=rail], [entity=rail-signal], [entity=rubia-armored-locomotive] i tym podobne, a także wszystko wykonane z [item=craptonite-frame].\n   • [entity=craptonite-wall] blokuje ruch śmieciosteroidów, ale nie ich pojawianie się. Mury te są odporne na uderzenia, jednak każdy inny obiekt w obszarze rażenia otrzyma normalne obrażenia.\n   • [technology=physical-projectile-damage-1]/[technology=weapon-shooting-speed-1]/itp. zwiększają wytrzymałość [entity=medium-trashsteroid]. Wyższe poziomy technologii nadal dają znaczącą przewagę - ale mniejszą, niż mógłbyś się spodziewać.\n   • Ustawienie poziomu trudności Rubii skaluje punkty wytrzymałości oraz obrażenia zadawane przez śmieciosteroidy.\n\n[font=default-semibold]Porady dotyczące Megabazy/UPS:[/font]\n   • Niepatrzenie na Rubię drastycznie obniża koszt UPS (renderowanie śmieciosteroidów zajmuje dużo czasu).\n   • Śmieciosteroidy pojawiają się tylko w tych fragmentach mapy, które zawierają wrażliwe na nie obiekty lub znajdują się w polu widzenia gracza.\n   • Nie obawiaj się eksplorować dużych obszarów - spędziłem tygodnie na optymalizacji śmieciosteroidów, aby nie zużywały CPU na nieistotne fragmenty mapy.\n   • Zniszczone śmieciosteroidy nie kosztują UPS.\n   • Tryb megabazy (włączany w opcjach moda) zmiejsza koszt UPS dla bardzo dużych baz, ale unieruchamia śmieciosteroidy.
rubia-wind-tips=Wschodnie wiatry mają następujące efekty: \n   • [entity=inserter] i [entity=splitter] przemieszczają przedmioty wyłącznie w prawo.\n   • [entity=transport-belt], [entity=underground-belt] oraz [entity=electric-mining-drill] nie mogą przemieszczać przedmiotów w lewo.\n   • [entity=logistic-robot] nie są w stanie bezpiecznie nawigować do [entity=requester-chest], [entity=buffer-chest], [entity=active-provider-chest] i [entity=rocket-silo].\n   • [entity=locomotive], [entity=cargo-wagon], [entity=recycler] i tym podobne nie wytrzymują działania wiatru.\n   • [entity=rubia-wind-turbine] generują prąd.\n\n-----------\nPełna lista obiektów niedostępnych na Rubii: 
rubia-crapapult-tips=[entity=crapapult] niszczy [color=250,250,0][font=default-semibold]większość przedmiotów[/font][/color] rzucając je na wiatr. Wiele badań wymaga wystrzelenia dużej ilości przedmiotów. Szajsapulta NIE jest budynkiem militarnym.
rubia-garbo-grabber-tips=Użycie zwykłej lub wybuchowej amunicji do niszczenia średnich śmieciosteroidow w zasięgu śmieciozbieracza pozwala zebrać grudy szajsonitu.
rubia-craptonite-wall-tips=[entity=craptonite-wall] blokuje ruch [entity=medium-trashsteroid].
